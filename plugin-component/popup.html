<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Piano JS</title>
	<link rel="stylesheet" href="popup.css" />
</head>

<body>
	<header class="popup-header">
		<h1>Piano JS</h1>
		<p id="load-status" class="load-status">Loading sounds…</p>
	</header>

	<section class="piano-panel">
		<div id="sketch-holder"></div>
	</section>

	<div class="transpose-bar">
		<label>Transpose</label>
		<button type="button" id="transpose-down" aria-label="Transpose down">−</button>
		<span id="transpose-value">0</span>
		<button type="button" id="transpose-up" aria-label="Transpose up">+</button>
	</div>

	<section class="degree-section">
		<h2>Scale degrees</h2>
		<p class="degree-hint">Drag from the library onto <strong>+ Add</strong>, or tap a chord then <strong>+ Add</strong>. × removes saved extras.</p>
		<div id="degree-chords"></div>
	</section>

	<section class="chord-section" id="jazz-chords-section">
		<h2 class="chord-section-head">
			<button type="button" id="jazz-chords-toggle" class="accordion-trigger" aria-expanded="true" aria-controls="jazz-chords-panel">
				<span class="accordion-chevron" aria-hidden="true">▾</span>
				<span class="accordion-title">Jazz chords — <span id="current-key-label" class="current-key-label">C major</span></span>
			</button>
		</h2>
		<div id="jazz-chords-panel" class="jazz-chords-panel">
			<p class="jazz-hint">Library: drag onto <strong>+ Add</strong> or tap chord then <strong>+ Add</strong>.</p>
			<div class="table-wrap">
				<table id="chord-table">
					<thead>
						<tr>
							<th class="row-key">Key</th>
							<th>I</th>
							<th>II</th>
							<th>III</th>
							<th>IV</th>
							<th>V</th>
							<th>VI</th>
							<th>VII</th>
						</tr>
					</thead>
					<tbody id="chord-table-body"></tbody>
				</table>
			</div>
		</div>
	</section>

	<p class="footer-hint">Click piano keys or chords to play</p>

	<script src="lib/Tone.min.js"></script>
	<script src="lib/p5.min.js"></script>
	<script src="definitions.js"></script>
	<script src="key_ui.js"></script>
	<script src="piano_ui.js"></script>
	<script src="sketch.js"></script>
	<script src="chords-ui.js"></script>
	<script src="popup.js"></script>
</body>

</html>
