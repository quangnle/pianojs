<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Piano JS</title>
	<link rel="stylesheet" href="popup.css" />
</head>

<body class="pianojs-popup">
	<header class="popup-header">
		<h1>Piano JS</h1>
		<p id="load-status" class="load-status">Loading sounds…</p>
	</header>

	<section class="piano-panel">
		<div id="sketch-holder"></div>
	</section>

	<div class="transpose-bar">
		<label>Transpose</label>
		<button type="button" id="transpose-down" aria-label="Transpose down">−</button>
		<span id="transpose-value">0</span>
		<button type="button" id="transpose-up" aria-label="Transpose up">+</button>
	</div>

	<section class="degree-section">
		<h2>Scale degrees — <span id="current-key-label" class="current-key-label">C major</span></h2>
		<p class="degree-hint">Tap <strong>+ Add</strong> on a column to pick chords (multi-select). × removes extras.</p>
		<div id="degree-chords"></div>
	</section>

	<p class="footer-hint">Click piano keys or chords to play</p>

	<div id="chord-picker-overlay" class="chord-picker-overlay" hidden aria-hidden="true">
		<div class="chord-picker-dialog" role="dialog" aria-modal="true" aria-labelledby="chord-picker-title">
			<h3 id="chord-picker-title" class="chord-picker-title">Add chords</h3>
			<p class="chord-picker-sub">Tick chords for this scale degree, then add all at once.</p>
			<div id="chord-picker-list" class="chord-picker-list"></div>
			<div class="chord-picker-actions">
				<button type="button" id="chord-picker-select-all" class="chord-picker-secondary">Select all</button>
				<button type="button" id="chord-picker-clear" class="chord-picker-secondary">Clear</button>
				<button type="button" id="chord-picker-cancel" class="chord-picker-secondary">Cancel</button>
				<button type="button" id="chord-picker-confirm" class="chord-picker-primary">Add selected</button>
			</div>
		</div>
	</div>

	<script src="lib/Tone.min.js"></script>
	<script src="definitions.js"></script>
	<script src="piano_dom.js"></script>
	<script src="chords-ui.js"></script>
	<script src="popup.js"></script>
</body>

</html>
